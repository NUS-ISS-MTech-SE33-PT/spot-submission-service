name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  deployments: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve SHA
        id: resolve
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout at target SHA
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-spot-submission-service-prod-role
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: makango-spot-submission-service
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$REPOSITORY:$SHA" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            ./spot-submission-service
          docker push "$REGISTRY/$REPOSITORY:$SHA"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Deploy to ECS
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster prod-cluster \
            --services spot-submission-service \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "ECS service is active — triggering forced redeployment..."
            aws ecs update-service \
              --cluster prod-cluster \
              --service spot-submission-service \
              --force-new-deployment \
              --region ap-southeast-1
          else
            echo "ECS service not active (status: $STATUS). Image pushed to ECR; skipping ECS update."
          fi

      - name: Move prod tag to this commit
        run: |
          git tag -f prod "${{ steps.resolve.outputs.sha }}"
          git push origin -f prod

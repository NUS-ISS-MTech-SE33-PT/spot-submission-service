name: Deploy to Prod

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::921142537307:role/spot-submission-service-github-actions-role
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: makango-spot-submission-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest ./spot-submission-service
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to ECS (if running)
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster prod-cluster \
            --services spot-submission-service \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "ECS service is active, triggering deployment..."
            aws ecs update-service \
              --cluster prod-cluster \
              --service spot-submission-service \
              --force-new-deployment \
              --region ap-southeast-1
          else
            echo "ECS service not active (status: $STATUS), skipping deploy. Image pushed to ECR."
          fi

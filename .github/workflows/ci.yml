name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Job 1: Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET 9
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore spot-submission-service.sln

      - name: Test with coverage threshold
        run: |
          dotnet test spot-submission-service.sln \
            --configuration Release \
            --no-restore \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage-results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=35 \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Report
        run: |
          reportgenerator \
            -reports:$(find ./coverage-results -name "*.xml" | head -1) \
            -targetdir:coverage-report \
            -reporttypes:Html

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage-report/

  # ── Job 2: Docker Build ──────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Build Docker image
        run: docker build -t spot-submission-service:${{ github.sha }} ./spot-submission-service

  # ── Job 3: Lint / SAST (Snyk) ───────────────────────────────────────────────
  sast:
    name: Lint / SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup .NET 9
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore spot-submission-service.sln

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Open Source (SCA)
        run: snyk test --file=spot-submission-service.sln --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code (SAST)
        run: snyk code test --severity-threshold=high
        working-directory: ./spot-submission-service
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build image for container scan
        run: docker build -t spot-submission-service:scan ./spot-submission-service

      - name: Snyk Container
        run: snyk container test spot-submission-service:scan --file=Dockerfile --severity-threshold=high
        working-directory: ./spot-submission-service
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
